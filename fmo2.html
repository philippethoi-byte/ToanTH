<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Tập Toán Học</title>
    <style>
        /* GIỮ NGUYÊN CSS CỦA BẠN */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif; padding: 30px 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
        .header { background: linear-gradient(135deg, #f59e0b, #d97706); padding: 30px 20px; text-align: center; color: white; }
        .header h1 { font-size: 2.5rem; margin-bottom: 8px; letter-spacing: -0.5px; }
        .header p { font-size: 1.1rem; opacity: 0.9; }
        .content-area { padding: 30px 25px; background: #fefaf5; }
        .setup-section { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 2px solid #ffe6c2; }
        .control-group { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; justify-content: center; margin-bottom: 15px; }
        select, input { padding: 10px 15px; border-radius: 10px; border: 1px solid #ddd; font-size: 1rem; }
        .btn-primary { background: #f59e0b; color: white; border: none; padding: 12px 25px; border-radius: 40px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary:hover { background: #d97706; transform: scale(1.05); }
        .history-box { background: #fff3e0; padding: 15px; border-radius: 15px; margin-bottom: 20px; color: #b45309; }
        .question-card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 8px solid #f59e0b; }
        .options-list { list-style: none; margin-top: 15px; padding-left: 0 !important; }
        .option-item { margin-bottom: 10px; padding: 12px; border: 1px solid #ffe6c2; border-radius: 12px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .option-item:hover { background: #fff7ed; }
        .result-section { text-align: center; display: none; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; border: 10px solid #f59e0b; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px auto; font-size: 1.5rem; font-weight: bold; }
        .review-card { text-align: left; background: #fff; padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #eee; }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; }
        .incorrect { background: #fee2e2 !important; border-color: #ef4444 !important; }
        .explanation { background: #f0f9ff; padding: 10px; border-radius: 10px; margin-top: 10px; font-size: 0.9rem; color: #0369a1; border-left: 4px solid #0ea5e9; }
        .hidden { display: none; }
        footer { text-align: center; padding: 16px; font-size: 0.8rem; background: #fff7ed; color: #a16207; border-top: 1px solid #ffe6c2; }
        
        /* CSS CHO BẢNG VÀ BIỂU ĐỒ */
        .history-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .history-table th, .history-table td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        .history-table th { background: #f59e0b; color: white; }
        .chart-container { width: 100%; max-width: 800px; margin: 30px auto; padding: 20px; background: white; border-radius: 20px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Toán Tiểu Học</h1>
        <p>Luyện tập mỗi ngày - Nâng tầm trí tuệ</p>
    </div>
    <div class="content-area">
        <div id="historySummary" class="history-box">Đang tải...</div>

        <div id="setupView" class="setup-section">
            <div class="control-group">
                <select id="difficultySelect">
                    <option value="all">Tất cả độ khó</option>
                    <option value="de">Dễ</option>
                    <option value="trung-binh">Trung bình</option>
                    <option value="kho">Khó</option>
                </select>
                <input type="number" id="questionCount" value="5" min="1" max="20">
                <button class="btn-primary" onclick="startQuiz()">Bắt đầu làm bài</button>
            </div>
        </div>

        <div id="quizView" class="hidden">
            <div id="questionContainer"></div>
            <button class="btn-primary" onclick="submitQuiz()" style="display:block; margin: 20px auto;">Nộp bài</button>
        </div>

        <div id="resultView" class="result-section">
            <h2 id="congratsMsg">Kết quả</h2>
            <div class="score-circle">
                <span id="scoreText">0/0</span>
                <small id="percentText">0%</small>
            </div>

            

            <button class="btn-primary" onclick="resetQuiz()" style="margin-top: 30px;">Làm bài khác</button>
            <div id="reviewContainer"></div>
			<div class="chart-container">
                <canvas id="progressChart"></canvas>
            </div>

            <div id="historyTableContainer"></div>
        </div>
    </div>
</div>

<script>
    let allQuestions = [];
    let currentQuestions = [];
    let myChart = null;
    const API_URL = 'https://raw.githubusercontent.com/philippethoi-byte/ToanTH/main/questions/questions.json';

    async function init() {
        try {
            const response = await fetch(API_URL);
            allQuestions = await response.json();
            updateHistoryUI();
        } catch (e) { console.error("Lỗi tải câu hỏi"); }
    }

    function startQuiz() {
		const diff = document.getElementById('difficultySelect').value;
		const count = parseInt(document.getElementById('questionCount').value);
		let filtered = diff === 'all' ? allQuestions : allQuestions.filter(q => q.difficulty === diff);
		
		currentQuestions = filtered.sort(() => 0.5 - Math.random()).slice(0, count);
		
		const container = document.getElementById('questionContainer');
		container.innerHTML = currentQuestions.map((q, i) => {
			// Tìm vị trí X của câu hỏi trong mảng gốc allQuestions (bắt đầu từ 1)
			const questionID = allQuestions.indexOf(q) + 1;
			const imagePath = `images/cau${questionID}.png`;

			return `
				<div class="question-card">
					<h3 style="margin-bottom: 10px;">Câu ${i+1}: ${q.questionText}</h3>
					
					<div class="question-img-container" style="text-align: center; margin-bottom: 15px;">
						<img src="${imagePath}" 
							 alt="Hình minh họa câu ${questionID}"
							 style="max-width: 100%; max-height: 300px; border-radius: 12px; display: block; margin: 0 auto;"
							 onerror="this.parentElement.style.display='none'"> 
							 </div>

					<div class="options-list">
						${q.options.map(opt => `
							<label class="option-item">
								<input type="checkbox" name="q-${i}" value="${opt.id}">
								<span><strong>${opt.id}:</strong> ${opt.content}</span>
							</label>
						`).join('')}
					</div>
				</div>
			`;
		}).join('');

		document.getElementById('setupView').classList.add('hidden');
		document.getElementById('quizView').classList.remove('hidden');
		document.getElementById('resultView').classList.add('hidden');
		window.scrollTo(0, 0);
	}

    function submitQuiz() {
        let correctCount = 0;
        const results = currentQuestions.map((q, i) => {
            const selected = Array.from(document.querySelectorAll(`input[name="q-${i}"]:checked`)).map(el => el.value);
            const isCorrect = selected.length === q.correctAnswers.length && selected.every(v => q.correctAnswers.includes(v));
            if (isCorrect) correctCount++;
            return { ...q, userAnswers: selected, isCorrect };
        });

        // CHỈ GỌI LƯU 1 LẦN DUY NHẤT
        saveHistory(correctCount, currentQuestions.length);
        showResults(correctCount, currentQuestions.length, results);
    }

    // CẬP NHẬT HÀM SHOWRESULTS ĐỂ HIỆN BIỂU ĐỒ
    function showResults(correct, total, results) {
        const percent = Math.round((correct / total) * 100);
        
        // 1. Phải hiện resultView lên TRƯỚC để Canvas có kích thước
        document.getElementById('quizView').classList.add('hidden');
        const resultView = document.getElementById('resultView');
        resultView.style.display = 'block'; // Hiển thị khung kết quả
        
        document.getElementById('scoreText').innerText = `${correct}/${total}`;
        document.getElementById('percentText').innerText = `${percent}%`;

        // 2. Dùng setTimeout để chắc chắn trình duyệt đã render xong HTML rồi mới vẽ Chart
        setTimeout(() => {
            displayHistoryAnalytics();
        }, 100);

        // 3. Hiển thị lời chúc
        let msg = percent >= 80 ? "Tuyệt vời! Bạn rất thông minh! 🎉" : 
                  (percent >= 50 ? "Khá tốt! Tiếp tục phát huy nhé! 👍" : "Cố gắng hơn nữa nhé!");
        document.getElementById('congratsMsg').innerText = msg;

        // 4. Đổ dữ liệu Review
       document.getElementById('reviewContainer').innerHTML = `
			<h3 style="margin: 20px 0 10px 0; text-align: left;">Chi tiết bài làm:</h3>
			${results.map((r, i) => {
				// Tìm câu hỏi gốc trong allQuestions dựa trên nội dung văn bản
				const originalIndex = allQuestions.findIndex(q => q.questionText === r.questionText);
				const questionNumber = originalIndex + 1;
				const imagePath = `images/cau${questionNumber}.png`;

				return `
					<div class="review-card ${r.isCorrect ? 'correct' : 'incorrect'}">
						<p><strong>Câu ${i+1}:</strong> ${r.questionText}</p>
						
						<div style="text-align: left; margin: 10px 0;">
							<img src="${imagePath}" 
								 style="max-width: 200px; border-radius: 8px; display: block;" 
								 onerror="this.style.display='none'">
						</div>

						<p>Đáp án bạn chọn: <strong>${r.userAnswers.join(', ') || 'Chưa chọn'}</strong></p>
						<p>Đáp án đúng: <strong style="color: #059669">${r.correctAnswers.join(', ')}</strong></p>
						<div class="explanation"><strong>Giải thích:</strong> ${r.explanation}</div>
					</div>
				`;
			}).join('')}
		`;
        
        window.scrollTo(0, 0);
    }

    // CẬP NHẬT LẠI HÀM RESET ĐỂ ĐỒNG BỘ DISPLAY
    function resetQuiz() {
        document.getElementById('resultView').style.display = 'none';
        document.getElementById('setupView').classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    function saveHistory(correct, total) {
        const history = JSON.parse(localStorage.getItem('quiz_history') || '[]');
        history.push({
            date: new Date().toLocaleDateString('vi-VN'),
            correct,
            total,
            percent: Math.round((correct/total)*100),
            time: new Date().getTime()
        });
        localStorage.setItem('quiz_history', JSON.stringify(history));
        updateHistoryUI();
    }

    function displayHistoryAnalytics() {
        const history = JSON.parse(localStorage.getItem('quiz_history') || '[]');
        if (history.length === 0) return;

        // Vẽ Bảng
        const dayCounter = {};
        let tableHtml = `<table class="history-table"><thead><tr><th>Ngày</th><th>Lần</th><th>Đúng</th><th>Tỉ lệ</th></tr></thead><tbody>`;
        
        // Tạo bảng (đảo ngược để cái mới nhất lên đầu)
        const rows = history.map((item, index) => {
            dayCounter[item.date] = (dayCounter[item.date] || 0) + 1;
            return `<tr><td>${item.date}</td><td>${dayCounter[item.date]}</td><td>${item.correct}/${item.total}</td><td>${item.percent}%</td></tr>`;
        });
        tableHtml += rows.reverse().join('') + `</tbody></table>`;
        document.getElementById('historyTableContainer').innerHTML = tableHtml;

        // Vẽ Biểu đồ
        const ctx = document.getElementById('progressChart').getContext('2d');
        if (myChart) myChart.destroy();
        
        const last10 = history.slice(-10);
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: last10.map((_, i) => `Lần ${i+1}`),
                datasets: [{
                    label: '% Chính xác',
                    data: last10.map(h => h.percent),
                    borderColor: '#f59e0b',
                    tension: 0.3,
                    fill: true,
                    backgroundColor: 'rgba(245, 158, 11, 0.1)'
                }]
            },
            options: { scales: { y: { min: 0, max: 100 } } }
        });
    }

    function updateHistoryUI() {
        const history = JSON.parse(localStorage.getItem('quiz_history') || '[]');
        const summaryBox = document.getElementById('historySummary');
        if (history.length === 0) {
            summaryBox.innerHTML = "🌟 Chào mừng! Hãy bắt đầu bài kiểm tra đầu tiên.";
            return;
        }
        const last = history[history.length - 1];
        summaryBox.innerHTML = `Lần cuối: ${last.date} - Đúng ${last.correct}/${last.total} (${last.percent}%)`;
    }



    init();
</script>
</body>
</html>
